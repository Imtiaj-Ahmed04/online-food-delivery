# Local dev/test profile -> in-memory H2 in PostgreSQL-compatibility mode.
# Lets the app run + be tested WITHOUT Docker/Postgres installed.
# Activate with:  --spring.profiles.active=local   (or SPRING_PROFILES_ACTIVE=local)
# Same schema.sql / data.sql are reused (written portable for H2 + Postgres).
spring:
  datasource:
    url: jdbc:h2:mem:ofd;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
